<!DOCTYPE html>
<html lang="pl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <meta name="referrer" content="no-referrer">
    
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="Walkman">
    <link rel="apple-touch-icon" href="https://upload.wikimedia.org/wikipedia/commons/thumb/e/e0/Walkman_logo.svg/512px-Walkman_logo.svg.png">
    
    <title>Walkman Cloud - iOS Native Edition</title>
    <style>
        :root { --accent: #1db954; --bg: #121212; --card: #1e1e1e; --text: #e0e0e0; --danger: #e74c3c; --hires: #9b59b6; --edit: #3498db; }
        
        /* ZABEZPIECZENIE PRZED ROZCIĄGANIEM NA BOKI */
        html, body { 
            overflow-x: hidden; 
            width: 100%; 
            max-width: 100vw; 
            font-family: '-apple-system', 'BlinkMacSystemFont', 'Segoe UI', Roboto, Helvetica, Arial, sans-serif; 
            background: var(--bg); 
            color: var(--text); 
            padding: 20px; 
            margin: 0; 
            box-sizing: border-box;
            -webkit-tap-highlight-color: transparent; /* Usuwa niebieski błysk przy klikaniu na iOS */
        }
        
        *, *:before, *:after { box-sizing: inherit; }

        .container { max-width: 1000px; margin: auto; width: 100%; }
        h1 { text-align: center; color: var(--accent); letter-spacing: 1px; font-size: 24px; }
        
        .panel { background: var(--card); padding: 20px; border-radius: 12px; margin-bottom: 20px; border: 1px solid #333; width: 100%; }
        .input-group { display: flex; gap: 10px; flex-wrap: wrap; width: 100%; }
        input, button, select, textarea { padding: 12px; border-radius: 8px; border: 1px solid #333; background: #282828; color: white; outline: none; -webkit-appearance: none; }
        input:focus, select:focus, textarea:focus { border-color: var(--accent); }
        button { background: var(--accent); color: black; font-weight: bold; cursor: pointer; border: none; transition: 0.2s; }
        button:active { transform: scale(0.96); opacity: 0.8; }
        
        /* KAFELKI WYSZUKIWANIA */
        #apiResults { display: flex; overflow-x: auto; gap: 15px; margin-bottom: 20px; padding-bottom: 10px; scrollbar-width: none; }
        #apiResults::-webkit-scrollbar { display: none; }
        
        .result-card { min-width: 150px; width: 150px; background: var(--card); padding: 10px; border-radius: 10px; text-align: center; font-size: 11px; border: 1px solid #333; display: flex; flex-direction: column; justify-content: space-between; }
        .result-card img { width: 100%; aspect-ratio: 1 / 1; object-fit: cover; border-radius: 6px; margin-bottom: 8px; }
        
        /* Ucinanie i łamanie długiego tekstu na kafelku */
        .result-card p { 
            display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical; 
            overflow: hidden; text-overflow: ellipsis; white-space: normal;
            height: 28px; margin: 5px 0; font-weight: bold; font-size: 11px;
        }
        .result-card select { width: 100%; padding: 8px; margin-bottom: 8px; font-size: 12px; background: #1a1a1a; text-align: center; }
        
        /* SZTYWNA TABELA */
        table { 
            table-layout: fixed; /* KLUCZOWE - zapobiega rozjeżdżaniu */
            width: 100%; 
            border-collapse: collapse; 
            background: var(--card); 
            border-radius: 12px; 
            overflow: hidden; 
        }
        th { background: #282828; color: var(--accent); padding: 15px; text-align: left; cursor: pointer; user-select: none; border-bottom: 2px solid #333; }
        td { padding: 12px; border-bottom: 1px solid #282828; word-wrap: break-word; overflow-wrap: break-word; }
        
        /* Sztywne szerokości kolumn */
        th:nth-child(1), td:nth-child(1) { width: 70px; text-align: center; }
        th:nth-child(3), td:nth-child(3) { width: 100px; text-align: center; }
        
        .main-row { cursor: pointer; transition: background 0.2s; }
        .main-row:active { background: #252525; }
        .album-cover-mini { width: 50px; height: 50px; object-fit: cover; border-radius: 6px; box-shadow: 0 2px 5px rgba(0,0,0,0.5); }
        
        .details-row { display: none; background: #151515; }
        .details-content { padding: 20px; display: flex; gap: 20px; border-left: 4px solid var(--accent); }
        .details-cover-big { width: 200px; height: 200px; object-fit: cover; border-radius: 8px; box-shadow: 0 4px 15px rgba(0,0,0,0.6); }
        
        .tracklist { flex: 1; font-size: 13px; color: #bbb; max-height: 250px; overflow-y: auto; background: #111; padding: 12px; border-radius: 8px; }
        .loader { text-align: center; padding: 20px; display: none; color: var(--accent); font-weight: bold; }
        
        .btn-delete { background: var(--danger); color: white; padding: 10px; font-size: 13px; flex: 1; border-radius: 8px; }
        .btn-edit { background: var(--edit); color: white; padding: 10px; font-size: 13px; flex: 1; border-radius: 8px; }
        .actions-bar { display: flex; gap: 10px; margin-top: 15px; width: 100%; }

        .modal { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.85); z-index: 1000; justify-content: center; align-items: center; }
        .modal-content { background: var(--card); padding: 20px; border-radius: 14px; width: 92%; max-width: 400px; border: 1px solid #333; max-height: 85vh; overflow-y: auto; }
        .modal-content label { display: block; margin: 12px 0 6px; font-size: 12px; color: var(--accent); font-weight: bold; }
        .modal-content input, .modal-content select, .modal-content textarea { width: 100%; }
        .modal-content textarea { height: 80px; resize: none; }
        .modal-buttons { display: flex; justify-content: space-between; gap: 10px; margin-top: 20px; }
        .btn-cancel { background: #444; color: white; flex: 1; }

        .status-flac { color: var(--accent); font-weight: bold; }
        .status-flachires { color: var(--hires); font-weight: bold; }
        .status-mp3 { color: #3498db; font-weight: bold; }
        .status-szukam { color: #f1c40f; font-weight: bold; }
        .status-mam { color: var(--accent); font-weight: bold; opacity: 0.8; }
        
        .sort-icon { font-size: 10px; margin-left: 5px; opacity: 0.5; }

        /* ======================================================= */
        /* SPECJALNY UKŁAD DLA iOS I EKRANÓW MOBILNYCH             */
        /* ======================================================= */
        @media (max-width: 600px) {
            body { padding: 10px 5px; } /* Mniejsze marginesy boczne */
            .panel { padding: 15px; margin-bottom: 15px; border-radius: 10px; }
            
            .input-group { flex-direction: column; }
            .input-group > input, .input-group > select, .input-group > button { 
                width: 100%; 
                font-size: 16px; /* Wymuszone 16px wyłącza zoomowanie Safari */
            }
            
            /* KAFELKI WYSZUKIWANIA -> SIATKA (GRID) */
            #apiResults {
                display: grid;
                grid-template-columns: 1fr 1fr; /* Równo 2 kolumny na środku */
                gap: 10px;
                overflow-x: hidden;
            }
            .result-card {
                width: 100%;
                min-width: unset;
                box-sizing: border-box;
            }
            
            /* KOMPRESJA TABELI DLA EKRANU iPHONE'A */
            th { padding: 12px 5px; font-size: 11px; }
            td { padding: 12px 5px; font-size: 13px; }
            
            /* Jeszcze mocniejsze zwężenie skrajnych kolumn na telefonie */
            th:nth-child(1), td:nth-child(1) { width: 55px; }
            th:nth-child(3), td:nth-child(3) { width: 85px; }
            
            .album-cover-mini { width: 45px; height: 45px; border-radius: 4px; }
            
            /* Pionowy układ detali */
            .details-content { flex-direction: column; align-items: center; padding: 15px 10px; text-align: center; }
            .details-cover-big { width: 160px; height: 160px; margin-bottom: 10px; }
            .tracklist { width: 100%; text-align: left; max-height: 200px; }
            .modal-content { padding: 15px; }
        }
    </style>
</head>
<body>

<div class="container">
    <h1>🎧 Walkman Cloud</h1>

    <div class="panel">
        <h3 style="margin-top: 0; font-size: 13px; color: #888;">🌐 DODAJ Z BAZY DISCOGS</h3>
        <div class="input-group">
            <input type="text" id="query" placeholder="Artysta lub Album..." onkeypress="if(event.key === 'Enter') searchDiscogs()">
            <button onclick="searchDiscogs()">Szukaj 🔍</button>
        </div>
    </div>
    
    <div id="apiResults"></div>
    <div id="loader" class="loader">Ładowanie...</div>

    <div class="panel" style="border: 1px solid var(--accent); background: #161616;">
        <h3 style="margin-top: 0; font-size: 13px; color: var(--accent);">📁 TWOJA KOLEKCJA</h3>
        <div class="input-group">
            <input type="text" id="localSearch" placeholder="Szukaj w swoich albumach..." onkeyup="renderTable()">
            <select id="statusFilter" onchange="renderTable()">
                <option value="ALL">Wszystkie formaty</option>
                <option value="FLAC">FLAC</option>
                <option value="FLAC HI-RES">FLAC Hi-Res</option>
                <option value="MP3">MP3</option>
                <option value="SZUKAM">SZUKAM</option>
            </select>
        </div>
    </div>

    <table>
        <thead>
            <tr>
                <th>Okładka</th>
                <th>
                    <div onclick="sortCollection('Wykonawca')" style="cursor:pointer; margin-bottom:4px; font-size: 12px;">Wykonawca <span class="sort-icon">↕</span></div>
                    <div onclick="sortCollection('Album')" style="cursor:pointer; font-size:10px; opacity:0.7;">Album <span class="sort-icon">↕</span></div>
                </th>
                <th onclick="sortCollection('Status')" style="font-size: 11px;">Format <span class="sort-icon">↕</span></th>
            </tr>
        </thead>
        <tbody id="collectionBody"></tbody>
    </table>
</div>

<div id="editModal" class="modal">
    <div class="modal-content">
        <h2 style="margin-top:0; color:var(--edit); font-size: 18px; text-align: center;">✏️ Edytuj Wpis</h2>
        <input type="hidden" id="editIndex">
        
        <label>Wykonawca</label>
        <input type="text" id="editArtist">
        
        <label>Tytuł Albumu</label>
        <input type="text" id="editAlbum">
        
        <label>Format / Status</label>
        <select id="editStatus">
            <option value="FLAC">FLAC</option>
            <option value="FLAC Hi-Res">FLAC Hi-Res</option>
            <option value="MP3">MP3</option>
            <option value="SZUKAM">SZUKAM</option>
        </select>
        
        <label>Tracklista (oddziel przecinkiem)</label>
        <textarea id="editTracks"></textarea>
        
        <div class="modal-buttons">
            <button class="btn-cancel" onclick="closeEditModal()">Anuluj</button>
            <button style="background:var(--edit); color:white; flex: 1;" onclick="saveEdit()">Zapisz</button>
        </div>
    </div>
</div>

<script>
    // ==========================================
    // TUTAJ WKLEJ SWOJE DANE (z zewnątrz)
    // ==========================================
    const GOOGLE_SCRIPT_URL = 'https://script.google.com/macros/s/AKfycbz4JnEN2c4xOhJMKwQ8cXNdasCG3IjqXb02kFQeR-RVRcotmSfX_L5S27LcBCWBD3NimQ/exec';
    const DISCOGS_TOKEN = 'seIzjqdJrlKLDTmydSZSALggtMsgAzGAOfNXzMzt';
    // ==========================================

    let myCollection = [];
    let currentSort = { key: '', asc: true };

    async function loadFromSheets() {
        document.getElementById('loader').style.display = 'block';
        try {
            const res = await fetch(GOOGLE_SCRIPT_URL, { redirect: 'follow' });
            myCollection = await res.json();
            renderTable();
        } catch (e) { 
            alert("Błąd połączenia z bazą Google.");
        }
        document.getElementById('loader').style.display = 'none';
    }

    function sortCollection(key) {
        if (currentSort.key === key) currentSort.asc = !currentSort.asc;
        else { currentSort.key = key; currentSort.asc = true; }
        
        myCollection.sort((a, b) => {
            let valA = (a[key] || "").toLowerCase();
            let valB = (b[key] || "").toLowerCase();
            if (valA < valB) return currentSort.asc ? -1 : 1;
            if (valA > valB) return currentSort.asc ? 1 : -1;
            return 0;
        });
        renderTable();
    }

    function openEditModal(originalIndex) {
        const item = myCollection[originalIndex];
        document.getElementById('editIndex').value = originalIndex;
        document.getElementById('editArtist').value = item.Wykonawca || '';
        document.getElementById('editAlbum').value = item.Album || '';
        
        let cleanStatus = String(item.Status).trim().toUpperCase();
        if (cleanStatus === "MAM") cleanStatus = "FLAC";
        const select = document.getElementById('editStatus');
        if (Array.from(select.options).some(o => o.value.toUpperCase() === cleanStatus)) {
            select.value = Array.from(select.options).find(o => o.value.toUpperCase() === cleanStatus).value;
        } else { select.value = "FLAC"; }
        
        document.getElementById('editTracks').value = item.Utwory || '';
        document.getElementById('editModal').style.display = 'flex';
    }

    function closeEditModal() { document.getElementById('editModal').style.display = 'none'; }

    async function saveEdit() {
        const index = document.getElementById('editIndex').value;
        const oldItem = myCollection[index];
        const payload = {
            action: "EDIT", oldWykonawca: oldItem.Wykonawca, oldAlbum: oldItem.Album,
            Wykonawca: document.getElementById('editArtist').value, Album: document.getElementById('editAlbum').value,
            Status: document.getElementById('editStatus').value, Utwory: document.getElementById('editTracks').value
        };

        closeEditModal();
        document.getElementById('loader').style.display = 'block';

        try {
            await fetch(GOOGLE_SCRIPT_URL, { method: 'POST', mode: 'no-cors', body: JSON.stringify(payload) });
            setTimeout(loadFromSheets, 1500); 
        } catch(e) { alert("Błąd zapisu."); document.getElementById('loader').style.display = 'none'; }
    }

    async function deleteAlbum(originalIndex) {
        const item = myCollection[originalIndex];
        if (!confirm(`Usunąć: ${item.Wykonawca} - ${item.Album}?`)) return;
        document.getElementById('loader').style.display = 'block';
        const payload = { action: "DELETE", Wykonawca: item.Wykonawca, Album: item.Album };
        try {
            await fetch(GOOGLE_SCRIPT_URL, { method: 'POST', mode: 'no-cors', body: JSON.stringify(payload) });
            setTimeout(loadFromSheets, 1500); 
        } catch(e) { alert("Błąd usuwania."); document.getElementById('loader').style.display = 'none'; }
    }

    async function searchDiscogs() {
        const query = document.getElementById('query').value;
        if (!query) return;
        document.getElementById('loader').style.display = 'block';
        try {
            const res = await fetch(`https://api.discogs.com/database/search?q=${encodeURIComponent(query)}&type=release&token=${DISCOGS_TOKEN}&per_page=6`);
            const data = await res.json();
            document.getElementById('apiResults').innerHTML = data.results.map(r => `
                <div class="result-card">
                    <img src="${r.cover_image || 'https://via.placeholder.com/150'}">
                    <p>${r.title}</p>
                    <select id="statusSelect-${r.id}">
                        <option value="FLAC">FLAC</option>
                        <option value="FLAC Hi-Res">FLAC Hi-Res</option>
                        <option value="MP3">MP3</option>
                        <option value="SZUKAM">SZUKAM</option>
                    </select>
                    <button onclick="addAlbum('${r.title.replace(/'/g,"\\'")}', '${r.cover_image}', '${r.id}')">DODAJ</button>
                </div>
            `).join('');
        } catch(e) { alert("Błąd API Discogs"); }
        document.getElementById('loader').style.display = 'none';
    }

    async function addAlbum(title, cover, id) {
        const status = document.getElementById(`statusSelect-${id}`).value;
        document.getElementById('loader').style.display = 'block';
        try {
            const trackRes = await fetch(`https://api.discogs.com/releases/${id}?token=${DISCOGS_TOKEN}`);
            const trackData = await trackRes.json();
            const tracks = trackData.tracklist ? trackData.tracklist.map(t => t.title).join(', ') : "Brak";
            
            const parts = title.split(' - ');
            const entry = { Wykonawca: parts[0] || "Nieznany", Album: parts[1] || "Nieznany", Status: status, Okładka: cover, Utwory: tracks, DiscogsID: id };

            await fetch(GOOGLE_SCRIPT_URL, { method: 'POST', mode: 'no-cors', body: JSON.stringify(entry) });
            document.getElementById('apiResults').innerHTML = '';
            document.getElementById('query').value = '';
            setTimeout(loadFromSheets, 1500);
        } catch(e) { alert("Błąd dodawania"); document.getElementById('loader').style.display = 'none'; }
    }

    function renderTable() {
        const body = document.getElementById('collectionBody');
        const localSearch = document.getElementById('localSearch').value.toLowerCase();
        const statusFilter = document.getElementById('statusFilter').value;

        const collectionWithIndex = myCollection.map((item, index) => ({...item, originalIndex: index}));

        const filteredCollection = collectionWithIndex.filter(item => {
            if (!item.Wykonawca) return false;
            const matchesText = item.Wykonawca.toLowerCase().includes(localSearch) || item.Album.toLowerCase().includes(localSearch);
            
            let matchesStatus = true;
            if (statusFilter !== "ALL") {
                const itemStatus = String(item.Status).toUpperCase().trim();
                if (statusFilter === "FLAC") matchesStatus = (itemStatus === "FLAC" || itemStatus === "MAM");
                else if (statusFilter === "FLAC HI-RES") matchesStatus = itemStatus === "FLAC HI-RES";
                else if (statusFilter === "MP3") matchesStatus = itemStatus === "MP3";
                else if (statusFilter === "SZUKAM") matchesStatus = itemStatus === "SZUKAM";
            }
            return matchesText && matchesStatus;
        });

        body.innerHTML = filteredCollection.map((item, visualIndex) => {
            const cleanStatus = String(item.Status || '').toLowerCase().replace(/[^a-z0-9]/g, '');
            const tracks = (item.Utwory || '').split(',').map((t, idx) => `<div style="padding:5px 0; border-bottom:1px solid #222;">${idx+1}. ${t.trim()}</div>`).join('');
            
            return `
                <tr class="main-row" onclick="toggle(${visualIndex})">
                    <td><img src="${item.Okładka || 'https://via.placeholder.com/150'}" class="album-cover-mini"></td>
                    <td>
                        <strong style="display:block; margin-bottom:3px;">${item.Wykonawca}</strong>
                        <span style="font-size:12px; color:#aaa; line-height: 1.2;">${item.Album}</span>
                    </td>
                    <td class="status-${cleanStatus}" style="font-size: 12px; text-align:center;">${item.Status}</td>
                </tr>
                <tr id="details-${visualIndex}" class="details-row">
                    <td colspan="3">
                        <div class="details-content">
                            <img src="${item.Okładka || 'https://via.placeholder.com/220'}" class="details-cover-big">
                            <div style="flex:1; width: 100%;">
                                <h2 style="margin:0 0 10px 0; color:var(--accent); font-size:18px;">${item.Album}</h2>
                                <div class="tracklist">
                                    <strong style="display:block; margin-bottom: 5px; color:#fff;">Utwory:</strong>
                                    ${tracks || "Brak listy utworów"}
                                </div>
                                <div class="actions-bar">
                                    <button class="btn-edit" onclick="openEditModal(${item.originalIndex}); event.stopPropagation();">EDYTUJ ✏️</button>
                                    <button class="btn-delete" onclick="deleteAlbum(${item.originalIndex}); event.stopPropagation();">USUŃ 🗑️</button>
                                </div>
                            </div>
                        </div>
                    </td>
                </tr>
            `;
        }).join('');
    }

    function toggle(visualIndex) {
        const el = document.getElementById(`details-${visualIndex}`);
        const isVisible = el.style.display === 'table-row';
        document.querySelectorAll('.details-row').forEach(r => r.style.display = 'none');
        el.style.display = isVisible ? 'none' : 'table-row';
    }

    loadFromSheets();
</script>
</body>
</html>
