<!DOCTYPE html>
<html lang="pl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <meta name="referrer" content="no-referrer">
    
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="Walkman">
    <link rel="apple-touch-icon" href="https://upload.wikimedia.org/wikipedia/commons/thumb/e/e0/Walkman_logo.svg/512px-Walkman_logo.svg.png">
    
    <title>Walkman Cloud - Native iOS Edition</title>
    <style>
        :root { --accent: #1db954; --bg: #000000; --card: #121212; --text: #ffffff; --text-dim: #b3b3b3; --danger: #e74c3c; --hires: #9b59b6; --edit: #3498db; }
        
        /* RESET & NATIVE FEEL */
        *, *::before, *::after { box-sizing: border-box; }
        
        html, body { 
            overflow-x: hidden; 
            width: 100%; 
            font-family: -apple-system, BlinkMacSystemFont, "SF Pro Text", "Segoe UI", Roboto, sans-serif; 
            background: var(--bg); 
            color: var(--text); 
            padding: 0; 
            margin: 0; 
            -webkit-tap-highlight-color: transparent;
            padding-bottom: env(safe-area-inset-bottom); /* Ochrona przed dolnym paskiem iPhone'a */
        }

        .container { max-width: 800px; margin: 0 auto; width: 100%; padding: 15px; display: flex; flex-direction: column; gap: 15px; }
        
        h1 { text-align: center; color: var(--accent); font-size: 20px; margin: 10px 0; font-weight: 700; }
        
        /* PANELE JAK W APLIKACJACH */
        .panel { background: var(--card); padding: 15px; border-radius: 12px; width: 100%; }
        .panel-title { font-size: 11px; text-transform: uppercase; color: var(--text-dim); margin-top: 0; margin-bottom: 12px; font-weight: 600; letter-spacing: 1px;}
        
        .input-group { display: flex; gap: 8px; width: 100%; }
        input, button, select, textarea { padding: 14px; border-radius: 8px; border: none; background: #282828; color: white; font-size: 16px; width: 100%; outline: none; -webkit-appearance: none; }
        input::placeholder { color: #888; }
        button { background: var(--accent); color: #000; font-weight: bold; cursor: pointer; transition: 0.2s; }
        button:active { transform: scale(0.95); opacity: 0.8; }
        
        /* GRID WYSZUKIWANIA DISCOGS */
        #apiResults { display: grid; grid-template-columns: repeat(2, 1fr); gap: 10px; width: 100%; }
        .result-card { background: #1a1a1a; padding: 10px; border-radius: 10px; display: flex; flex-direction: column; gap: 8px; }
        .result-card img { width: 100%; aspect-ratio: 1/1; object-fit: cover; border-radius: 6px; }
        .result-card p { font-size: 12px; font-weight: 600; margin: 0; display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical; overflow: hidden; }
        .result-card select { padding: 8px; font-size: 13px; background: #282828; }
        .result-card button { padding: 10px; font-size: 13px; }

        /* PASEK SORTOWANIA */
        .sort-bar { display: flex; justify-content: space-between; padding: 10px 5px; font-size: 12px; color: var(--text-dim); font-weight: 600; border-bottom: 1px solid #222; margin-bottom: 5px; }
        .sort-btn { cursor: pointer; display: flex; align-items: center; gap: 4px; }
        
        /* NOWA LISTA (ZASTĘPUJE TABELĘ) */
        .list-container { display: flex; flex-direction: column; width: 100%; background: var(--card); border-radius: 12px; overflow: hidden; }
        
        .list-row { display: flex; align-items: center; padding: 12px 15px; gap: 12px; border-bottom: 1px solid #1a1a1a; cursor: pointer; transition: background 0.2s; }
        .list-row:active { background: #282828; }
        
        .row-cover { width: 48px; height: 48px; border-radius: 4px; object-fit: cover; flex-shrink: 0; background: #282828; }
        
        /* Ucinanie tekstu kluczem do braku scrolla poziomego! */
        .row-info { flex: 1; min-width: 0; display: flex; flex-direction: column; justify-content: center; }
        .row-artist { font-weight: 600; font-size: 15px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; margin-bottom: 2px; }
        .row-album { font-size: 13px; color: var(--text-dim); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
        
        .row-status { font-size: 11px; font-weight: 700; padding: 4px 8px; border-radius: 12px; background: #282828; flex-shrink: 0; }

        /* ROZWINIĘCIE DETALI */
        .details-container { display: none; background: #0a0a0a; padding: 20px; flex-direction: column; align-items: center; border-bottom: 1px solid #1a1a1a; }
        .details-cover-large { width: 180px; height: 180px; border-radius: 8px; box-shadow: 0 10px 20px rgba(0,0,0,0.5); margin-bottom: 15px; }
        .details-album-title { font-size: 20px; font-weight: 800; text-align: center; margin: 0 0 15px 0; color: var(--accent); }
        .details-tracks { width: 100%; background: #121212; border-radius: 8px; padding: 12px; font-size: 13px; color: #ccc; max-height: 250px; overflow-y: auto; -webkit-overflow-scrolling: touch; }
        .actions-bar { display: flex; gap: 10px; width: 100%; margin-top: 15px; }
        .btn-edit { background: var(--edit); color: white; border-radius: 8px; }
        .btn-delete { background: var(--danger); color: white; border-radius: 8px; }

        /* MODAL EDYCJI */
        .modal { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.9); z-index: 9999; justify-content: center; align-items: center; padding: 20px; }
        .modal-content { background: var(--card); padding: 20px; border-radius: 16px; width: 100%; max-width: 400px; max-height: 90vh; overflow-y: auto; -webkit-overflow-scrolling: touch; }
        .modal-content h2 { margin: 0 0 15px 0; color: var(--edit); font-size: 18px; text-align: center; }
        .modal-content label { display: block; font-size: 11px; color: var(--text-dim); margin: 10px 0 5px 5px; text-transform: uppercase; letter-spacing: 1px;}
        .modal-content input, .modal-content select, .modal-content textarea { background: #000; border: 1px solid #333; }
        .modal-content textarea { height: 80px; resize: none; font-family: inherit; }
        .modal-buttons { display: flex; gap: 10px; margin-top: 20px; }
        .btn-cancel { background: #333; color: white; }

        /* KOLORY STATUSÓW */
        .status-flac { color: #1db954; }
        .status-flachires { color: #9b59b6; }
        .status-mp3 { color: #3498db; }
        .status-szukam { color: #f1c40f; }
        .status-mam { color: #1db954; }
        
        .loader { text-align: center; padding: 20px; font-weight: bold; color: var(--accent); display: none; }

        @media (min-width: 600px) {
            .input-group { flex-direction: row; }
            #localSearch { flex: 2; }
            #statusFilter { flex: 1; }
            #query { flex: 2; }
            .input-group button { flex: 1; }
        }
        @media (max-width: 599px) {
            .input-group { flex-direction: column; }
        }
    </style>
</head>
<body>

<div class="container">
    <h1>Walkman Cloud</h1>

    <div class="panel">
        <h3 class="panel-title">🌐 Dodaj z Discogs</h3>
        <div class="input-group">
            <input type="text" id="query" placeholder="Artysta lub album..." onkeypress="if(event.key === 'Enter') searchDiscogs()">
            <button onclick="searchDiscogs()">Szukaj</button>
        </div>
    </div>
    
    <div id="apiResults"></div>
    <div id="loader" class="loader">Wczytywanie...</div>

    <div class="panel" style="padding-bottom: 5px;">
        <h3 class="panel-title" style="color: var(--accent);">📁 Twoja Kolekcja</h3>
        <div class="input-group" style="margin-bottom: 15px;">
            <input type="text" id="localSearch" placeholder="Filtruj listę..." onkeyup="renderList()">
            <select id="statusFilter" onchange="renderList()">
                <option value="ALL">Wszystkie formaty</option>
                <option value="FLAC">FLAC</option>
                <option value="FLAC HI-RES">FLAC Hi-Res</option>
                <option value="MP3">MP3</option>
                <option value="SZUKAM">SZUKAM</option>
            </select>
        </div>
        
        <div class="sort-bar">
            <div class="sort-btn" onclick="sortCollection('Wykonawca')">Wykonawca ↕</div>
            <div class="sort-btn" onclick="sortCollection('Album')">Album ↕</div>
            <div class="sort-btn" onclick="sortCollection('Status')">Format ↕</div>
        </div>
    </div>

    <div class="list-container" id="collectionBody">
        </div>
</div>

<div id="editModal" class="modal">
    <div class="modal-content">
        <h2>Edytuj Wpis</h2>
        <input type="hidden" id="editIndex">
        
        <label>Wykonawca</label>
        <input type="text" id="editArtist">
        
        <label>Album</label>
        <input type="text" id="editAlbum">
        
        <label>Format</label>
        <select id="editStatus">
            <option value="FLAC">FLAC</option>
            <option value="FLAC Hi-Res">FLAC Hi-Res</option>
            <option value="MP3">MP3</option>
            <option value="SZUKAM">SZUKAM</option>
        </select>
        
        <label>Utwory</label>
        <textarea id="editTracks"></textarea>
        
        <div class="modal-buttons">
            <button class="btn-cancel" style="flex:1" onclick="closeEditModal()">Anuluj</button>
            <button style="flex:1" onclick="saveEdit()">Zapisz</button>
        </div>
    </div>
</div>

<script>
    // ==========================================
    // TUTAJ WKLEJ SWOJE DANE
    // ==========================================
    const GOOGLE_SCRIPT_URL = 'https://script.google.com/macros/s/AKfycbz4JnEN2c4xOhJMKwQ8cXNdasCG3IjqXb02kFQeR-RVRcotmSfX_L5S27LcBCWBD3NimQ/exec';
    const DISCOGS_TOKEN = 'seIzjqdJrlKLDTmydSZSALggtMsgAzGAOfNXzMzt';
    // ==========================================

    let myCollection = [];
    let currentSort = { key: '', asc: true };

    async function loadFromSheets() {
        document.getElementById('loader').style.display = 'block';
        try {
            const res = await fetch(GOOGLE_SCRIPT_URL, { redirect: 'follow' });
            myCollection = await res.json();
            renderList();
        } catch (e) { alert("Błąd połączenia z bazą."); }
        document.getElementById('loader').style.display = 'none';
    }

    function sortCollection(key) {
        if (currentSort.key === key) currentSort.asc = !currentSort.asc;
        else { currentSort.key = key; currentSort.asc = true; }
        
        myCollection.sort((a, b) => {
            let valA = (a[key] || "").toLowerCase();
            let valB = (b[key] || "").toLowerCase();
            if (valA < valB) return currentSort.asc ? -1 : 1;
            if (valA > valB) return currentSort.asc ? 1 : -1;
            return 0;
        });
        renderList();
    }

    function openEditModal(originalIndex) {
        const item = myCollection[originalIndex];
        document.getElementById('editIndex').value = originalIndex;
        document.getElementById('editArtist').value = item.Wykonawca || '';
        document.getElementById('editAlbum').value = item.Album || '';
        
        let cleanStatus = String(item.Status).trim().toUpperCase();
        if (cleanStatus === "MAM") cleanStatus = "FLAC";
        const select = document.getElementById('editStatus');
        if (Array.from(select.options).some(o => o.value.toUpperCase() === cleanStatus)) {
            select.value = Array.from(select.options).find(o => o.value.toUpperCase() === cleanStatus).value;
        } else { select.value = "FLAC"; }
        
        document.getElementById('editTracks').value = item.Utwory || '';
        document.getElementById('editModal').style.display = 'flex';
    }

    function closeEditModal() { document.getElementById('editModal').style.display = 'none'; }

    async function saveEdit() {
        const index = document.getElementById('editIndex').value;
        const oldItem = myCollection[index];
        const payload = {
            action: "EDIT", oldWykonawca: oldItem.Wykonawca, oldAlbum: oldItem.Album,
            Wykonawca: document.getElementById('editArtist').value, Album: document.getElementById('editAlbum').value,
            Status: document.getElementById('editStatus').value, Utwory: document.getElementById('editTracks').value
        };
        closeEditModal();
        document.getElementById('loader').style.display = 'block';
        try {
            await fetch(GOOGLE_SCRIPT_URL, { method: 'POST', mode: 'no-cors', body: JSON.stringify(payload) });
            setTimeout(loadFromSheets, 1500); 
        } catch(e) { alert("Błąd zapisu."); document.getElementById('loader').style.display = 'none'; }
    }

    async function deleteAlbum(originalIndex) {
        const item = myCollection[originalIndex];
        if (!confirm(`Usunąć:\n${item.Wykonawca} - ${item.Album}?`)) return;
        document.getElementById('loader').style.display = 'block';
        const payload = { action: "DELETE", Wykonawca: item.Wykonawca, Album: item.Album };
        try {
            await fetch(GOOGLE_SCRIPT_URL, { method: 'POST', mode: 'no-cors', body: JSON.stringify(payload) });
            setTimeout(loadFromSheets, 1500); 
        } catch(e) { alert("Błąd usuwania."); document.getElementById('loader').style.display = 'none'; }
    }

    async function searchDiscogs() {
        const query = document.getElementById('query').value;
        if (!query) return;
        document.getElementById('loader').style.display = 'block';
        try {
            const res = await fetch(`https://api.discogs.com/database/search?q=${encodeURIComponent(query)}&type=release&token=${DISCOGS_TOKEN}&per_page=6`);
            const data = await res.json();
            document.getElementById('apiResults').innerHTML = data.results.map(r => `
                <div class="result-card">
                    <img src="${r.cover_image || 'https://via.placeholder.com/150'}">
                    <p>${r.title}</p>
                    <select id="statusSelect-${r.id}">
                        <option value="FLAC">FLAC</option>
                        <option value="FLAC Hi-Res">FLAC Hi-Res</option>
                        <option value="MP3">MP3</option>
                        <option value="SZUKAM">SZUKAM</option>
                    </select>
                    <button onclick="addAlbum('${r.title.replace(/'/g,"\\'")}', '${r.cover_image}', '${r.id}')">DODAJ</button>
                </div>
            `).join('');
        } catch(e) { alert("Błąd API Discogs"); }
        document.getElementById('loader').style.display = 'none';
    }

    async function addAlbum(title, cover, id) {
        const status = document.getElementById(`statusSelect-${id}`).value;
        document.getElementById('loader').style.display = 'block';
        try {
            const trackRes = await fetch(`https://api.discogs.com/releases/${id}?token=${DISCOGS_TOKEN}`);
            const trackData = await trackRes.json();
            const tracks = trackData.tracklist ? trackData.tracklist.map(t => t.title).join(', ') : "Brak";
            
            const parts = title.split(' - ');
            const entry = { Wykonawca: parts[0] || "Nieznany", Album: parts[1] || "Nieznany", Status: status, Okładka: cover, Utwory: tracks, DiscogsID: id };

            await fetch(GOOGLE_SCRIPT_URL, { method: 'POST', mode: 'no-cors', body: JSON.stringify(entry) });
            document.getElementById('apiResults').innerHTML = '';
            document.getElementById('query').value = '';
            setTimeout(loadFromSheets, 1500);
        } catch(e) { alert("Błąd dodawania"); document.getElementById('loader').style.display = 'none'; }
    }

    function renderList() {
        const container = document.getElementById('collectionBody');
        const localSearch = document.getElementById('localSearch').value.toLowerCase();
        const statusFilter = document.getElementById('statusFilter').value;

        const collectionWithIndex = myCollection.map((item, index) => ({...item, originalIndex: index}));

        const filtered = collectionWithIndex.filter(item => {
            if (!item.Wykonawca) return false;
            const textMatch = item.Wykonawca.toLowerCase().includes(localSearch) || item.Album.toLowerCase().includes(localSearch);
            
            let statusMatch = true;
            if (statusFilter !== "ALL") {
                const s = String(item.Status).toUpperCase().trim();
                if (statusFilter === "FLAC") statusMatch = (s === "FLAC" || s === "MAM");
                else if (statusFilter === "FLAC HI-RES") statusMatch = s === "FLAC HI-RES";
                else if (statusFilter === "MP3") statusMatch = s === "MP3";
                else if (statusFilter === "SZUKAM") statusMatch = s === "SZUKAM";
            }
            return textMatch && statusMatch;
        });

        container.innerHTML = filtered.map((item, vIndex) => {
            const cleanStatus = String(item.Status || '').toLowerCase().replace(/[^a-z0-9]/g, '');
            const tracks = (item.Utwory || '').split(',').map((t, idx) => `<div style="padding:6px 0; border-bottom:1px solid #222;">${idx+1}. ${t.trim()}</div>`).join('');
            
            return `
                <div class="list-row" onclick="toggleDetails(${vIndex})">
                    <img src="${item.Okładka || 'https://via.placeholder.com/150'}" class="row-cover">
                    <div class="row-info">
                        <div class="row-artist">${item.Wykonawca}</div>
                        <div class="row-album">${item.Album}</div>
                    </div>
                    <div class="row-status status-${cleanStatus}">${item.Status}</div>
                </div>
                <div class="details-container" id="details-${vIndex}">
                    <img src="${item.Okładka || 'https://via.placeholder.com/220'}" class="details-cover-large">
                    <h2 class="details-album-title">${item.Album}</h2>
                    <div class="details-tracks">${tracks || "Brak utworów"}</div>
                    <div class="actions-bar">
                        <button class="btn-edit" style="flex:1" onclick="openEditModal(${item.originalIndex}); event.stopPropagation();">Edytuj</button>
                        <button class="btn-delete" style="flex:1" onclick="deleteAlbum(${item.originalIndex}); event.stopPropagation();">Usuń</button>
                    </div>
                </div>
            `;
        }).join('');
    }

    function toggleDetails(vIndex) {
        const el = document.getElementById(`details-${vIndex}`);
        const isVisible = el.style.display === 'flex';
        document.querySelectorAll('.details-container').forEach(r => r.style.display = 'none');
        el.style.display = isVisible ? 'none' : 'flex';
    }

    loadFromSheets();
</script>
</body>
</html>
